name: deploy

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      server: ${{ steps.filter.outputs.server }}

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            infra: ['infra/**', '.github/workflows/deploy.yml']
            server: ['!infra/**']

  infra-preview:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    environment: team-mino-prod

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    env:
      PULUMI_CONFIG_PASSPHRASE: ""
      PULUMI_BACKEND_URL: gs://team-mino-prod-pulumi-state

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - run: bun install --frozen-lockfile
        working-directory: infra

      - uses: pulumi/actions@v7
        with:
          command: preview
          pulumi-version-file: infra/.pulumi.version
          stack-name: prod
          work-dir: infra
          refresh: true
          comment-on-pr: true
          edit-pr-comment: true
          always-include-summary: true
          suppress-progress: true

  infra-deploy:
    needs: changes
    if: github.event_name == 'push' && needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    environment: team-mino-prod

    permissions:
      id-token: write
      contents: read

    env:
      PULUMI_CONFIG_PASSPHRASE: ""
      PULUMI_BACKEND_URL: gs://team-mino-prod-pulumi-state

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - run: bun install --frozen-lockfile
        working-directory: infra

      - uses: pulumi/actions@v7
        with:
          command: up
          pulumi-version-file: infra/.pulumi.version
          stack-name: prod
          work-dir: infra
          refresh: true
          suppress-progress: true

  server-build:
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'team-mino-prod' || '' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - id: auth
        if: github.event_name == 'push'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}
          token_format: access_token

      - if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: asia-northeast3-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: asia-northeast3-docker.pkg.dev/team-mino-prod/team-mino-prod-docker/team-mino-prod-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  server-deploy:
    needs: [changes, infra-deploy, server-build]
    if: >-
      github.event_name == 'push'
      && needs.changes.outputs.server == 'true'
      && !cancelled()
      && needs.infra-deploy.result != 'failure'
      && needs.server-build.result == 'success'
    runs-on: ubuntu-latest
    environment: team-mino-prod

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - run: |
          gcloud run services update team-mino-prod-api \
            --image "asia-northeast3-docker.pkg.dev/team-mino-prod/team-mino-prod-docker/team-mino-prod-api:${{ github.sha }}" \
            --region "asia-northeast3" \
            --project "team-mino-prod"
